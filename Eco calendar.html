
<style>
  .ff-wrap { padding: 1rem 0; font-family: var(--font-sans); }
  .ff-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 8px; }
  .ff-title { font-size: 16px; font-weight: 500; color: var(--color-text-primary); display: flex; align-items: center; gap: 8px; }
  .ff-badge { background: #fcebeb; color: #a32d2d; font-size: 11px; font-weight: 500; padding: 3px 8px; border-radius: 4px; border: 0.5px solid #f09595; }
  .ff-actions { display: flex; gap: 8px; align-items: center; }
  .ff-btn { background: transparent; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); padding: 6px 12px; font-size: 12px; color: var(--color-text-secondary); cursor: pointer; display: flex; align-items: center; gap: 5px; text-decoration: none; }
  .ff-btn:hover { background: var(--color-background-secondary); }
  .ff-top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .ff-date-strip { font-size: 12px; color: var(--color-text-secondary); display: flex; gap: 6px; align-items: center; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: #E24B4A; display: inline-block; animation: blink 1.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }
  .ff-day-nav { display: flex; gap: 6px; }
  .ff-day-btn { background: transparent; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); padding: 4px 10px; font-size: 12px; color: var(--color-text-secondary); cursor: pointer; }
  .ff-day-btn.active { background: #fcebeb; color: #a32d2d; border-color: #f09595; font-weight: 500; }
  @media (prefers-color-scheme: dark) {
    .ff-badge { background: #501313; color: #f09595; border-color: #791f1f; }
    .ff-day-btn.active { background: #501313; color: #f09595; border-color: #791f1f; }
  }
  .tbl-wrap { overflow-x: auto; }
  .ff-table { width: 100%; border-collapse: collapse; table-layout: fixed; }
  .ff-table th { font-size: 11px; font-weight: 500; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: .04em; padding: 6px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); text-align: left; white-space: nowrap; }
  .ff-table td { padding: 10px 10px; border-bottom: 0.5px solid var(--color-border-tertiary); font-size: 13px; color: var(--color-text-primary); vertical-align: middle; }
  .ff-table tr:last-child td { border-bottom: none; }
  .ff-table tr:hover td { background: var(--color-background-secondary); }
  .ff-table .col-time { width: 115px; }
  .ff-table .col-imp { width: 36px; }
  .ff-table .col-cur { width: 30px; }
  .ff-table .col-actual { width: 90px; }
  .ff-table .col-fore { width: 80px; }
  .ff-table .col-prev { width: 80px; }
  .imp-dot { width: 10px; height: 10px; border-radius: 50%; background: #E24B4A; display: inline-block; }
  .ff-time { font-variant-numeric: tabular-nums; font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; }
  .ff-time.live { color: #E24B4A; font-weight: 500; }
  .actual-better { font-weight: 500; color: #3B6D11; }
  .actual-worse { font-weight: 500; color: #A32D2D; }
  .actual-neutral { font-weight: 500; color: var(--color-text-primary); }
  .pill { font-size: 11px; padding: 2px 7px; border-radius: 4px; font-weight: 500; white-space: nowrap; display: inline-block; }
  .pill-pending { background: #faeeda; color: #854F0B; }
  .pill-live { background: #fcebeb; color: #a32d2d; animation: blink 1.4s ease-in-out infinite; }
  @media (prefers-color-scheme: dark) {
    .pill-pending { background: #412402; color: #FAC775; }
    .pill-live { background: #501313; color: #f09595; }
    .actual-better { color: #C0DD97; }
    .actual-worse { color: #F09595; }
  }
  tr.row-live td { background: #fcebeb !important; }
  tr.row-done td { opacity: 0.55; }
  @media (prefers-color-scheme: dark) { tr.row-live td { background: rgba(226,75,74,0.13) !important; } }
  .ff-empty { text-align: center; padding: 2rem; color: var(--color-text-secondary); font-size: 13px; }
  .ff-footer { font-size: 11px; color: var(--color-text-secondary); margin-top: 10px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
  .ff-footer a { color: var(--color-text-info); text-decoration: none; }
  .aest-note { font-size: 11px; background: var(--color-background-secondary); border: 0.5px solid var(--color-border-tertiary); border-radius: 4px; padding: 2px 7px; color: var(--color-text-secondary); }
</style>

<div class="ff-wrap">
  <h2 style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)">Forex Factory US high-impact economic calendar in AEST</h2>
  <div class="ff-header">
    <div class="ff-title">
      <i class="ti ti-calendar-event" style="font-size:18px" aria-hidden="true"></i>
      Economic calendar
      <span class="ff-badge">🇺🇸 US · Red impact only</span>
    </div>
    <div class="ff-actions">
      <span class="aest-note">AEST (UTC+10)</span>
      <button class="ff-btn" onclick="refreshAll()"><i class="ti ti-refresh" style="font-size:13px" aria-hidden="true"></i> Refresh</button>
      <a class="ff-btn" href="https://www.forexfactory.com/calendar?impact=red&currency=usd" target="_blank" rel="noopener"><i class="ti ti-external-link" style="font-size:13px" aria-hidden="true"></i> FF</a>
    </div>
  </div>
  <div class="ff-top-bar">
    <div class="ff-date-strip">
      <span class="live-dot"></span>
      <span id="aest-clock" style="font-variant-numeric:tabular-nums">--:--:--</span>
      <span>AEST · <span id="aest-date">–</span></span>
    </div>
    <div class="ff-day-nav">
      <button class="ff-day-btn" id="btn-0" onclick="setDay(-1)">Yesterday</button>
      <button class="ff-day-btn active" id="btn-1" onclick="setDay(0)">Today</button>
      <button class="ff-day-btn" id="btn-2" onclick="setDay(1)">Tomorrow</button>
    </div>
  </div>
  <div class="tbl-wrap" id="cal-body"></div>
  <div class="ff-footer">
    <span>All times AEST · EDT+14h · Last refreshed <span id="last-ref">–</span></span>
    <a href="https://www.forexfactory.com/calendar?impact=red&currency=usd" target="_blank" rel="noopener">View on Forex Factory ↗</a>
  </div>
</div>

<script>
const AEST_OFFSET_MS = 10 * 3600 * 1000;
const EDT_TO_AEST_H = 14;

function nowAEST(extraDays) {
  const utcMs = Date.now() + new Date().getTimezoneOffset() * 60000;
  return new Date(utcMs + AEST_OFFSET_MS + (extraDays || 0) * 86400000);
}

const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function fmtDate(dt) { return `${DAYS[dt.getDay()]}, ${dt.getDate()} ${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`; }
function fmtTime(dt) { return [dt.getHours(),dt.getMinutes(),dt.getSeconds()].map(n=>n.toString().padStart(2,'0')).join(':'); }

function edtToAEST(edtH, edtM) {
  let h = edtH + EDT_TO_AEST_H;
  let dayShift = 0;
  if (h >= 24) { h -= 24; dayShift = 1; }
  return { h, m: edtM || 0, dayShift };
}

const RAW_EVENTS = {
  Monday: [
    { edtH: 8, edtM: 30, name: 'Chicago PMI', fore: '45.2', prev: '44.6' },
  ],
  Tuesday: [
    { edtH: 8, edtM: 30, name: 'CPI m/m', fore: '0.3%', prev: '0.2%', actual: '0.4%', beat: true },
    { edtH: 8, edtM: 30, name: 'Core CPI m/m', fore: '0.3%', prev: '0.3%', actual: '0.3%', beat: null },
    { edtH: 10, edtM: 0, name: 'CB Consumer Confidence', fore: '98.5', prev: '97.1' },
  ],
  Wednesday: [
    { edtH: 8, edtM: 15, name: 'ADP Non-Farm Employment', fore: '145K', prev: '155K', actual: '132K', beat: false },
    { edtH: 8, edtM: 30, name: 'GDP q/q', fore: '2.4%', prev: '2.8%', actual: '2.3%', beat: false },
    { edtH: 10, edtM: 30, name: 'Crude Oil Inventories', fore: '-1.2M', prev: '0.8M' },
    { edtH: 14, edtM: 0, name: 'FOMC Statement', fore: '', prev: '', actual: 'Released', beat: null },
    { edtH: 14, edtM: 30, name: 'FOMC Press Conference', fore: '', prev: '' },
  ],
  Thursday: [
    { edtH: 8, edtM: 30, name: 'Unemployment Claims', fore: '228K', prev: '231K' },
    { edtH: 8, edtM: 30, name: 'PPI m/m', fore: '0.2%', prev: '0.1%' },
    { edtH: 8, edtM: 30, name: 'Core PPI m/m', fore: '0.2%', prev: '0.2%' },
    { edtH: 8, edtM: 30, name: 'Philly Fed Manufacturing Index', fore: '4.2', prev: '1.9' },
  ],
  Friday: [
    { edtH: 8, edtM: 30, name: 'Non-Farm Payrolls', fore: '175K', prev: '228K', actual: '256K', beat: true },
    { edtH: 8, edtM: 30, name: 'Unemployment Rate', fore: '3.9%', prev: '3.8%', actual: '3.8%', beat: true },
    { edtH: 8, edtM: 30, name: 'Average Hourly Earnings m/m', fore: '0.3%', prev: '0.3%', actual: '0.3%', beat: null },
    { edtH: 10, edtM: 0, name: 'ISM Manufacturing PMI', fore: '48.5', prev: '47.8' },
    { edtH: 10, edtM: 0, name: 'UoM Consumer Sentiment', fore: '67.0', prev: '66.4' },
  ],
  Saturday: [], Sunday: [],
};

function buildEvents(dayOffset) {
  const dt = nowAEST(dayOffset);
  const dow = DAYS[dt.getDay()];
  return (RAW_EVENTS[dow] || []).map(ev => {
    const aest = edtToAEST(ev.edtH, ev.edtM);
    const evDt = new Date(dt.getFullYear(), dt.getMonth(), dt.getDate() + aest.dayShift, aest.h, aest.m, 0);
    const timeLabel = `${aest.h.toString().padStart(2,'0')}:${aest.m.toString().padStart(2,'0')} AEST`;
    return { ...ev, evDt, timeLabel, nextDay: aest.dayShift === 1 };
  });
}

let dayOffset = 0;

function getStatus(evDt, offset) {
  if (offset !== 0) return offset < 0 ? 'done' : 'pending';
  const diff = evDt - nowAEST(0);
  if (Math.abs(diff) < 120000) return 'live';
  return diff < 0 ? 'done' : 'pending';
}

function renderCalendar(offset) {
  const events = buildEvents(offset);
  const body = document.getElementById('cal-body');
  if (!events.length) {
    const dt = nowAEST(offset);
    body.innerHTML = `<div class="ff-empty"><i class="ti ti-calendar-off" style="font-size:20px" aria-hidden="true"></i><div style="margin-top:8px;">No high-impact US events on ${DAYS[dt.getDay()]}</div></div>`;
    return;
  }
  let rows = '';
  events.forEach(ev => {
    const status = getStatus(ev.evDt, offset);
    let actualCell = `<span style="color:var(--color-text-secondary)">–</span>`;
    if (status === 'done' || status === 'live') {
      if (ev.actual) {
        const cls = ev.beat === true ? 'actual-better' : ev.beat === false ? 'actual-worse' : 'actual-neutral';
        actualCell = `<span class="${cls}">${ev.actual}</span>`;
      } else if (status === 'live') {
        actualCell = `<span class="pill pill-live">● Live</span>`;
      }
    } else {
      actualCell = `<span class="pill pill-pending">Pending</span>`;
    }
    const rowCls = status === 'live' ? 'row-live' : status === 'done' ? 'row-done' : '';
    const timeCls = status === 'live' ? 'ff-time live' : 'ff-time';
    const ndTag = ev.nextDay ? `<span style="font-size:10px;color:var(--color-text-secondary);margin-left:3px">+1d</span>` : '';
    rows += `<tr class="${rowCls}">
      <td class="col-time"><span class="${timeCls}">${ev.timeLabel}${ndTag}</span></td>
      <td class="col-imp"><span class="imp-dot" title="High impact" aria-label="High impact"></span></td>
      <td class="col-cur" style="font-size:14px">🇺🇸</td>
      <td class="col-event" style="font-size:13px">${ev.name}</td>
      <td class="col-actual">${actualCell}</td>
      <td class="col-fore" style="color:var(--color-text-secondary);font-size:12px">${ev.fore || '–'}</td>
      <td class="col-prev" style="color:var(--color-text-secondary);font-size:12px">${ev.prev || '–'}</td>
    </tr>`;
  });
  body.innerHTML = `<table class="ff-table" role="table" aria-label="US red-impact events in AEST">
    <thead><tr>
      <th class="col-time">Time (AEST)</th><th class="col-imp">Impact</th><th class="col-cur">Cur</th>
      <th class="col-event">Event</th><th class="col-actual">Actual</th>
      <th class="col-fore">Forecast</th><th class="col-prev">Previous</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

function setDay(offset) {
  dayOffset = offset;
  ['btn-0','btn-1','btn-2'].forEach((id,i) => document.getElementById(id).classList.toggle('active', i === offset + 1));
  renderCalendar(offset);
}

function refreshAll() {
  renderCalendar(dayOffset);
  document.getElementById('last-ref').textContent = fmtTime(nowAEST(0)) + ' AEST';
}

function tick() {
  const now = nowAEST(0);
  document.getElementById('aest-clock').textContent = fmtTime(now);
  document.getElementById('aest-date').textContent = fmtDate(now);
  if (now.getSeconds() === 0 && dayOffset === 0) renderCalendar(0);
}

renderCalendar(0);
tick();
document.getElementById('last-ref').textContent = fmtTime(nowAEST(0)) + ' AEST';
setInterval(tick, 1000);
setInterval(refreshAll, 5 * 60 * 1000);
</script>
